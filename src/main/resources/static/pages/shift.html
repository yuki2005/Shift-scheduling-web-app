<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>自動シフト作成フォーム</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <div id="header">
        <h1>シフト自動割り当てシステム</h1>
    </div>

    <!-- ====== ナビメニュー ====== -->
    <div style="text-align:center; margin-top:20px;">
        <a href="history.html"
           style="padding:10px 20px; background:#2196F3; color:white; text-decoration:none; border-radius:5px;">
            シフト履歴を見る
        </a>
    </div>
    <br>
    <div>
        <a href="employee.html"
           style="padding:10px 20px; background:#2196F3; color:white; text-decoration:none; border-radius:5px;">
            従業員データを編集する
        </a>
    </div>
    <br>
	
	<div style="text-align:center; margin-top:20px;">
	        <a href="shift_preference.html"
	           style="padding:10px 20px; background:#2196F3; color:white; text-decoration:none; border-radius:5px;">
	            希望シフトを入力する
	        </a>
    </div>
	<br>
	
    <div>
        <a href="index.html"
           style="padding:10px 20px; background:#2196F3; color:white; text-decoration:none; border-radius:5px;">
            メインメニューに戻る
        </a>
    </div>
	

    <!-- ==================================================
         シフト条件入力フォーム
    ================================================== -->
    <div id="input-section">
        <h2>--- シフト条件入力フォーム ---</h2>

        <p>シフト対象日</p>
        <input type="date" id="shiftDateInput" name = "shiftDate">
        <br>
		
		<p id="autoDetectedDay" style="color:blue;"></p>


        <p>休日ですか？</p>
        <div class="radio-group">
            <input type="radio" name="isHoliday" value="true"> はい
            <input type="radio" name="isHoliday" value="false"> いいえ
        </div>
        <br>

        <h2>--- 従業員一覧（DBから自動ロード） ---</h2>
        <p style="color:gray;">※従業員の編集は「従業員データ編集」ページから行ってください</p>

		<!-- 従業員一覧（閲覧専用） -->
		<table id="employeeTable" border="1">
		    <thead>
		        <tr>
		            <th>社員番号</th>
		            <th>名前</th>
		            <th>デシャップ(D)</th>
		            <th>焼(Y)</th>
		            <th>揚(A)</th>
		            <th>板(I)</th>
		            <th>麺(IF)</th>
		            <th>全体フォロー(AF)</th>
		            <th>洗(W)</th>
		        </tr>
		    </thead>
		    <tbody id="employeeInputBody"></tbody>
		</table>

    </div>

	<button id="loadPrefsForShiftButton"
	        style="padding:10px; margin-top:10px;">
	    この日の希望を読み込む
	</button>

	<div id="loadedPrefMessage" style="margin-top:10px; color:blue;"></div>

	<table id="prefViewTable" border="1" style="margin-top:10px; display:none;">
	    <thead>
	        <tr>
	            <th>従業員</th>
	            <th>TOP</th>
	            <th>LUNCH</th>
	            <th>IDLE</th>
	            <th>DINNER</th>
	            <th>LAST</th>
	        </tr>
	    </thead>
	    <tbody id="prefViewBody"></tbody>
	</table>


    <!-- ==================================================
         実行ボタン
    ================================================== -->
    <div style="text-align: center; margin-top: 30px; padding: 20px;">
        <button id="submitButton" type="button"
                style="padding: 15px 30px; font-size: 1.2em;
                       background-color: #4CAF50; color: white;
                       border: none; border-radius: 5px; cursor: pointer;">
            最終決定：シフト割り当て実行
        </button>
    </div>

    <!-- ==================================================
         結果表示
    ================================================== -->
    <div id="result-section" style="display: none;">
        <h2>割り当て結果</h2>

        <div id="resultMessage" style="font-weight:bold; margin-bottom:10px;"></div>

        <table id="resultTable" border="1">
            <thead>
                <tr>
                    <th>ポジション</th>
                    <th>担当者</th>
                </tr>
            </thead>
            <tbody id="resultTableBody"></tbody>
        </table>

        <div id="selectedStaffList" style="margin-top:15px; font-size:0.9em;"></div>

        <button id="saveShiftButton"
                style="margin-top:20px; padding:10px 20px;
                       background:#2196F3; color:white; border:none; border-radius:5px;">
            このシフトを保存する
        </button>

        <div id="saveResultMessage" style="margin-top:10px; color:green;"></div>
    </div>
	
	<script type="module" src="/js/app.js"></script>

</body>
</html>

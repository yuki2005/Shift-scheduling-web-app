<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>シフト履歴一覧</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./history.js"></script>
</head>

<body>
    <h1>保存済みシフト一覧</h1>
	
	<div>
		<a href = "index.html"
		   style="padding:10px 20px; background:#2196F3; color:white; text-decoration:none; border-radius:5px;">
		メインメニューに戻る
		</a>
	</div>
	<br>
    <div style="margin-bottom:20px;">
        <button id="loadHistoryButton" style="padding:10px 20px;">
            履歴を読み込む
        </button>
    </div>
	<br>
	
	<input type="date" id="searchDateInput" />
	<button id="searchButton" style="padding:10px 20px;">
		検索
	</button>


    <table id="historyTable" border="1" style="width:100%; border-collapse:collapse;">
        <thead>
            <tr>
                <th>ID</th>
                <th>日付</th>
                <th>曜日</th>
                <th>休日</th>
                <th>メッセージ</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>

    <h2>選択したシフトの詳細</h2>
    <pre id="detailView" style="background:#f0f0f0; padding:10px;"></pre>
	
	<div id="detailView">
	  <h3 id="detailTitle"></h3>
	  <div id="assignmentTables"></div>
	</div>
	
	<h2>選択したシフトの詳細</h2>

	<div>
	  <h3 id="detailTitle"></h3>
	  <div id="assignmentTables"></div>
	</div>

	<table id="editShiftTable" border="1">
	  <thead>
	    <tr>
	      <th>時間帯</th>
	      <th>ポジション</th>
	      <th>担当者</th>
	    </tr>
	  </thead>
	  <tbody id="editShiftBody"></tbody>
	</table>

	<button id="saveEditBtn">修正を保存</button>



</body>
</html>
